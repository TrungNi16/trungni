<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - TrungNi Shop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <h2>🎮 TrungNi Shop</h2>
  <a href="index.html">Trang chủ</a>
</header>

<section class="shop-section">

  <h1>🛒 Shop Tài Khoản Game</h1>

  <div class="search-box">
    <input type="text" placeholder="Tìm kiếm tài khoản...">
  </div>

  <div class="product-grid">

    <div class="product-card">
      <div class="product-image">🔥</div>
      <h3>Free Fire VIP</h3>
      <p>Full skin • Rank Huyền Thoại</p>
      <div class="price">250.000đ</div>
      <button>Mua ngay</button>
    </div>

    <div class="product-card">
      <div class="product-image">⚔️</div>
      <h3>Liên Quân Cao Thủ</h3>
      <p>100+ tướng • 200+ skin</p>
      <div class="price">450.000đ</div>
      <button>Mua ngay</button>
    </div>

    <div class="product-card">
      <div class="product-image">🎮</div>
      <h3>Roblox Blox Fruits</h3>
      <p>Max Level • Fruit Hiếm</p>
      <div class="price">180.000đ</div>
      <button>Mua ngay</button>
    </div>

  </div>

</section>

</body>
</html>
