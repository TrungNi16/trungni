<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrungNi Shop</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:350px;
            box-shadow:0 0 30px rgba(0,0,0,.4);
        }

        img{
            width:120px;
            height:120px;
            border-radius:50%;
            border:4px solid #00e5ff;
        }

        h1{
            margin-top:15px;
        }

        p{
            color:#cbd5e1;
            margin:15px 0;
        }

        a{
            display:block;
            margin-top:12px;
            padding:12px;
            background:#00bcd4;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:.3s;
        }

        a:hover{
            background:#0097a7;
        }
    </style>

</head>

<body>

<div class="card">

<img src="https://i.imgur.com/4M34hi2.png">

<h1>🎮 TrungNi Shop</h1>

<p>Website chuyên Game & Trao đổi Acc</p>

<a href="#">🛒 Shop Game</a>

<a href="#">🔄 Trao Đổi Acc</a>

<a href="#">💬 Discord</a>

<a href="#">📘 Facebook</a>

</div>

</body>
</html>
