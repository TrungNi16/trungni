<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng bán tài khoản | TrungNi Shop</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/seller.css">

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="navbar">

<div class="logo">
<a href="index.html">TrungNi Shop</a>
</div>

<nav class="menu">

<a href="index.html">🏠 Trang chủ</a>

<a href="shop.html">🛒 Shop</a>

<a href="market.html">📦 Chợ tài khoản</a>

<a href="seller-dashboard.html">🏪 Seller</a>

</nav>

<div class="user-menu">

<div class="user-info">

👤 <span id="sellerName">Seller</span>

</div>

</div>

</header>

<section class="seller-page">

<div class="seller-card">

<div class="seller-title">

<h1>📦 Đăng bán tài khoản</h1>

<p>

Đăng tài khoản Game, Cloud Phone hoặc sản phẩm số lên TrungNi Shop.

</p>

</div>

<form id="productForm">

<div class="form-group">

<label>Tên sản phẩm</label>

<input
type="text"
id="name"
placeholder="Ví dụ: Acc Free Fire VIP"
required>

</div>

<div class="form-row">

<div class="form-group">

<label>Danh mục</label>

<select id="category">

<option value="freefire">🔥 Free Fire</option>

<option value="lienquan">⚔ Liên Quân</option>

<option value="roblox">🎮 Roblox</option>

<option value="minecraft">🧱 Minecraft</option>

<option value="ugphone">📱 UgPhone</option>

<option value="vmos">☁️ VMOS Cloud</option>

<option value="vsphone">📲 VSPhone Cloud</option>

</select>

</div>

<div class="form-group">

<label>Giá bán (VNĐ)</label>

<input
type="number"
id="price"
placeholder="100000"
required>

</div>

</div>

<div class="form-group">

<label>Mô tả tài khoản</label>

<textarea

id="description"

placeholder="Ví dụ:

• Rank Hero

• Full Skin

• Đã liên kết Email

• Bảo hành 30 ngày"

required></textarea>

</div>

<div class="form-group">

<label>Ảnh sản phẩm</label>

<input

type="file"

id="image"

accept="image/*">

</div>

<div class="preview-box">

<img id="previewImage">

</div>

<button

type="submit"

class="btn-submit">

🚀 Đăng bán sản phẩm

</button>

</form>

</div>

</section>

<script type="module" src="js/product.js"></script>

</body>

</html>
