<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký Seller - TrungNi Shop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

  <form class="auth-card">

    <h1>⭐ Đăng ký Seller</h1>

    <input type="text" placeholder="Tên cửa hàng" required>

    <input type="text" placeholder="Tên hiển thị Seller" required>

    <input type="tel" placeholder="Số điện thoại" required>

    <textarea placeholder="Mô tả cửa hàng" rows="4"></textarea>

    <button type="submit">Gửi yêu cầu</button>

    <p>Admin sẽ duyệt Seller trong vòng 24h.</p>

  </form>

</div>

</body>
</html>
